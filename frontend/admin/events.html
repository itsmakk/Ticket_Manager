<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Events - CSM Admin</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/admin/css/admin.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</head>
<body>
  <div class="admin-layout">
        <aside class="admin-sidebar">
      <div class="brand">CSM Admin</div>
      <div id="adminUserInfo" class="admin-user-info">
        <div id="adminUserName" class="admin-user-name"></div>
        <div id="adminUserEmail" class="admin-user-email"></div>
        <div id="adminUserMobile" class="admin-user-mobile"></div>
        <div id="adminUserRole" class="admin-user-role"></div>
      </div>
      <a href="/admin/index.html">Dashboard</a>
      <a href="/admin/events.html">Events</a>
      <a href="/admin/shows.html">Shows</a>
      <a href="/admin/seats.html">Seating</a>
      <a href="/admin/bookings.html">Bookings</a>
      <a href="/admin/counter.html">Counter Booking</a>
      <a href="/events.html" style="color:var(--secondary);">Book Tickets</a>
      <a href="/admin/promocodes.html">Promo Codes</a>
      <a href="/admin/reports.html">Reports</a>
      <a href="/admin/verify.html">Verify Tickets</a>
      <a href="/admin/audit.html">Audit Log</a>
      <a href="/admin/users.html">Users</a>
      <hr style="border-color:rgba(255,255,255,0.1);margin:1rem 0;" />
      <a href="/" style="color:var(--secondary);">View Site</a>
      <a href="#" id="adminLogout">Logout</a>
    </aside>
    <main class="admin-main">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
        <h1>Events</h1>
        <button class="btn btn-primary" onclick="showEventModal()">+ New Event</button>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table id="eventsTable">
            <thead><tr><th>Title</th><th>Category</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="eventsBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="eventModal" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="eventModalTitle">New Event</h2>
        <button class="modal-close" onclick="closeEventModal()">&times;</button>
      </div>
      <form id="eventForm">
        <input type="hidden" id="eventId" />
        <div class="form-group">
          <label class="form-label">Title</label>
          <input class="form-input" id="eventTitle" required />
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-input form-select" id="eventCategory">
            <option>Movie</option><option>Cultural Program</option><option>Stage Show</option>
            <option>Official Event</option><option>Special Program</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-input" id="eventDescription" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Poster Image URL</label>
          <input class="form-input" id="eventPoster" placeholder="https://..." />
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-input form-select" id="eventStatus">
            <option value="Draft">Draft</option><option value="Published">Published</option><option value="Archived">Archived</option>
          </select>
        </div>
        <button class="btn btn-primary btn-block" type="submit">Save Event</button>
      </form>
    </div>
  </div>
  <script src="/admin/js/events.js"></script>
</body>
</html>
