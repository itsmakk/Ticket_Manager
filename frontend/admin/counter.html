<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Counter Booking - CSM Admin</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/admin/css/admin.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>
  <div class="admin-layout">
        <aside class="admin-sidebar">
      <div class="brand">CSM Admin</div>
      <div id="adminUserInfo" class="admin-user-info">
        <div id="adminUserName" class="admin-user-name"></div>
        <div id="adminUserEmail" class="admin-user-email"></div>
        <div id="adminUserMobile" class="admin-user-mobile"></div>
        <div id="adminUserRole" class="admin-user-role"></div>
      </div>
      <a href="/admin/index.html">Dashboard</a>
      <a href="/admin/events.html">Events</a>
      <a href="/admin/shows.html">Shows</a>
      <a href="/admin/seats.html">Seating</a>
      <a href="/admin/bookings.html">Bookings</a>
      <a href="/admin/counter.html">Counter Booking</a>
      <a href="/admin/promocodes.html">Promo Codes</a>
      <a href="/admin/reports.html">Reports</a>
      <a href="/admin/verify.html">Verify Tickets</a>
      <a href="/admin/audit.html">Audit Log</a>
      <hr style="border-color:rgba(255,255,255,0.1);margin:1rem 0;" />
      <a href="/" style="color:var(--secondary);">View Site</a>
      <a href="#" id="adminLogout">Logout</a>
    </aside>
    <main class="admin-main">
      <h1>Counter Booking</h1>
      <div class="grid grid-2">
        <div class="card">
          <h3>Customer Details</h3>
          <form id="counterForm">
            <div class="form-group">
              <label class="form-label">Customer Name *</label>
              <input class="form-input" id="counterName" required />
            </div>
            <div class="form-group">
              <label class="form-label">Mobile *</label>
              <input class="form-input" type="tel" id="counterMobile" required pattern="[0-9]{10}" />
            </div>
            <div class="form-group">
              <label class="form-label">Email (optional)</label>
              <input class="form-input" type="email" id="counterEmail" />
            </div>
            <div class="form-group">
              <label class="form-label">Select Show</label>
              <select class="form-input form-select" id="counterShow" onchange="loadCounterSeats()"></select>
            </div>
            <div class="form-group">
              <label class="form-label">Payment Mode</label>
              <select class="form-input form-select" id="counterPayment">
                <option value="CASH">Cash</option><option value="UPI">UPI</option>
              </select>
            </div>
            <div id="counterSeatArea"></div>
            <div id="counterSummary" style="display:none;margin:1rem 0;padding:1rem;background:var(--gray-50);border-radius:var(--radius);"></div>
            <button class="btn btn-success btn-block btn-lg" type="submit">Confirm Booking & Generate Ticket</button>
          </form>
        </div>
        <div class="card">
          <h3>Selected Seats</h3>
          <div id="counterSelectedSeats"><p style="color:var(--gray-500);">Select seats to book.</p></div>
        </div>
      </div>
    </main>
  </div>
  <script src="/admin/js/counter.js"></script>
</body>
</html>
