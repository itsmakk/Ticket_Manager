<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Tickets - CSM Admin</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/admin/css/admin.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar"></aside>
    <main class="admin-main">
      <h1>Ticket Verification</h1>
      <div class="card" style="text-align:center;max-width:500px;margin:0 auto;">
        <p style="margin-bottom:1rem;">Enter Ticket ID to verify</p>
        <div style="display:flex;gap:0.5rem;">
          <input class="form-input" id="ticketId" placeholder="Enter Ticket ID or scan QR" />
          <button class="btn btn-primary" onclick="verifyTicket()">Verify</button>
        </div>
        <div id="verifyResult" style="margin-top:1.5rem;"></div>
      </div>
    </main>
  </div>
  <script src="/admin/js/verify.js"></script>
</body>
</html>
