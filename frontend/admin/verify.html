<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Tickets - CSM Admin</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/admin/css/admin.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</head>
<body>
  <div class="admin-layout">
        <aside class="admin-sidebar">
      <div class="brand">CSM Admin</div>
      <div id="adminUserInfo" style="padding:0.5rem;margin-bottom:0.5rem;background:rgba(255,255,255,0.05);border-radius:var(--radius);">
        <div id="adminUserName" style="font-size:0.85rem;font-weight:600;color:white;"></div>
        <div id="adminUserRole" style="font-size:0.75rem;color:rgba(255,255,255,0.6);text-transform:capitalize;"></div>
      </div>
      <a href="/admin/index.html">Dashboard</a>
      <a href="/admin/events.html">Events</a>
      <a href="/admin/shows.html">Shows</a>
      <a href="/admin/seats.html">Seating</a>
      <a href="/admin/bookings.html">Bookings</a>
      <a href="/admin/counter.html">Counter Booking</a>
      <a href="/admin/promocodes.html">Promo Codes</a>
      <a href="/admin/reports.html">Reports</a>
      <a href="/admin/verify.html">Verify Tickets</a>
      <a href="/admin/audit.html">Audit Log</a>
      <hr style="border-color:rgba(255,255,255,0.1);margin:1rem 0;" />
      <a href="/" style="color:var(--secondary);">View Site</a>
      <a href="#" id="adminLogout">Logout</a>
    </aside>
    <main class="admin-main">
      <h1>Ticket Verification</h1>
      <div class="card" style="text-align:center;max-width:500px;margin:0 auto;">
        <p style="margin-bottom:1rem;">Enter Ticket ID to verify</p>
        <div style="display:flex;gap:0.5rem;">
          <input class="form-input" id="ticketId" placeholder="Enter Ticket ID or scan QR" />
          <button class="btn btn-primary" onclick="verifyTicket()">Verify</button>
        </div>
        <div id="verifyResult" style="margin-top:1.5rem;"></div>
      </div>
    </main>
  </div>
  <script src="/admin/js/verify.js"></script>
</body>
</html>
