<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookings - CSM Admin</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/admin/css/admin.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar"></aside>
    <main class="admin-main">
      <h1>Bookings</h1>
      <div class="card">
        <div class="form-group">
          <input class="form-input" id="searchBooking" placeholder="Search by Booking ID, Name, Mobile, Event..." oninput="loadBookings()" />
        </div>
        <div class="table-wrap">
          <table id="bookingsTable">
            <thead><tr><th>Booking ID</th><th>Customer</th><th>Event</th><th>Seats</th><th>Amount</th><th>Source</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="bookingsBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <script src="/admin/js/bookings.js"></script>
</body>
</html>
