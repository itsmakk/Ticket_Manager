<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookings - CSM Admin</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/admin/css/admin.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/qrcode.min.js"></script>
</head>
<body>
  <div class="admin-layout">
        <aside class="admin-sidebar">
      <div class="brand">CSM Admin</div>
      <div id="adminUserInfo" class="admin-user-info">
        <div id="adminUserName" class="admin-user-name"></div>
        <div id="adminUserEmail" class="admin-user-email"></div>
        <div id="adminUserMobile" class="admin-user-mobile"></div>
        <div id="adminUserRole" class="admin-user-role"></div>
      </div>
      <a href="/admin/index.html">Dashboard</a>
      <a href="/admin/events.html">Events</a>
      <a href="/admin/shows.html">Shows</a>
      <a href="/admin/seats.html">Seating</a>
      <a href="/admin/bookings.html">Bookings</a>
      <a href="/admin/counter.html">Counter Booking</a>
      <a href="/events.html" style="color:var(--secondary);">Book Tickets</a>
      <a href="/admin/promocodes.html">Promo Codes</a>
      <a href="/admin/reports.html">Reports</a>
      <a href="/admin/verify.html">Verify Tickets</a>
      <a href="/admin/audit.html">Audit Log</a>
      <a href="/admin/users.html">Users</a>
      <hr style="border-color:rgba(255,255,255,0.1);margin:1rem 0;" />
      <a href="/" style="color:var(--secondary);">View Site</a>
      <a href="#" id="adminLogout">Logout</a>
    </aside>
    <main class="admin-main">
      <h1>Bookings</h1>
      <div class="card">
        <div class="form-group">
          <input class="form-input" id="searchBooking" placeholder="Search by Booking ID, Name, Mobile, Event..." oninput="loadBookings()" />
        </div>
        <div class="table-wrap">
          <table id="bookingsTable">
            <thead><tr><th>Booking ID</th><th>Customer</th><th>Event</th><th>Date/Time</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="bookingsBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <script src="/admin/js/bookings.js"></script>
</body>
</html>
