<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports - CSM Admin</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/admin/css/admin.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar"></aside>
    <main class="admin-main">
      <h1>Reports & Analytics</h1>
      <div class="grid grid-2">
        <div class="card">
          <h3>Daily Revenue</h3>
          <div id="dailyReport"><div class="spinner"></div></div>
        </div>
        <div class="card">
          <h3>Monthly Revenue</h3>
          <div id="monthlyReport"><div class="spinner"></div></div>
        </div>
        <div class="card">
          <h3>Event-wise Revenue</h3>
          <div id="eventReport"><div class="spinner"></div></div>
        </div>
        <div class="card">
          <h3>Occupancy Report</h3>
          <div id="occupancyReport"><div class="spinner"></div></div>
        </div>
      </div>
      <div class="card">
        <h3>Promo Code Usage</h3>
        <div id="promoReport"><div class="spinner"></div></div>
      </div>
    </main>
  </div>
  <script src="/admin/js/reports.js"></script>
</body>
</html>
