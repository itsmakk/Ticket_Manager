<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports - CSM Admin</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/admin/css/admin.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</head>
<body>
  <div class="admin-layout">
        <aside class="admin-sidebar">
      <div class="brand">CSM Admin</div>
      <div id="adminUserInfo" class="admin-user-info">
        <div id="adminUserName" class="admin-user-name"></div>
        <div id="adminUserEmail" class="admin-user-email"></div>
        <div id="adminUserMobile" class="admin-user-mobile"></div>
        <div id="adminUserRole" class="admin-user-role"></div>
      </div>
      <a href="/admin/index.html">Dashboard</a>
      <a href="/admin/events.html">Events</a>
      <a href="/admin/shows.html">Shows</a>
      <a href="/admin/seats.html">Seating</a>
      <a href="/admin/bookings.html">Bookings</a>
      <a href="/admin/counter.html">Counter Booking</a>
      <a href="/admin/promocodes.html">Promo Codes</a>
      <a href="/admin/reports.html">Reports</a>
      <a href="/admin/verify.html">Verify Tickets</a>
      <a href="/admin/audit.html">Audit Log</a>
      <a href="/admin/users.html">Users</a>
      <hr style="border-color:rgba(255,255,255,0.1);margin:1rem 0;" />
      <a href="/" style="color:var(--secondary);">View Site</a>
      <a href="#" id="adminLogout">Logout</a>
    </aside>
    <main class="admin-main">
      <h1>Reports & Analytics</h1>
      <div class="grid grid-2">
        <div class="card">
          <h3>Daily Revenue</h3>
          <div id="dailyReport"><div class="spinner"></div></div>
        </div>
        <div class="card">
          <h3>Monthly Revenue</h3>
          <div id="monthlyReport"><div class="spinner"></div></div>
        </div>
        <div class="card">
          <h3>Event-wise Revenue</h3>
          <div id="eventReport"><div class="spinner"></div></div>
        </div>
        <div class="card">
          <h3>Occupancy Report</h3>
          <div id="occupancyReport"><div class="spinner"></div></div>
        </div>
      </div>
      <div class="card">
        <h3>Promo Code Usage</h3>
        <div id="promoReport"><div class="spinner"></div></div>
      </div>
    </main>
  </div>
  <script src="/admin/js/reports.js"></script>
</body>
</html>
