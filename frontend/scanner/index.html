<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticket Scanner - CSM Auditorium</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</head>
<body>
  <header class="header">
    <div class="container">
      <a href="/scanner/index.html" class="logo">Scanner</a>
      <nav>
        <a href="/">Home</a>
        <a href="#" id="logoutBtn" style="display:none">Logout</a>
      </nav>
    </div>
  </header>
  <main class="container" style="padding-top:2rem;">
    <div class="card" style="max-width:500px;margin:0 auto;text-align:center;">
      <h1 style="font-size:1.5rem;margin-bottom:0.5rem;">Ticket Verification</h1>
      <p style="color:var(--gray-500);margin-bottom:1.5rem;">Enter Ticket ID or scan QR code</p>
      <div id="alert"></div>
      <div style="display:flex;gap:0.5rem;">
        <input class="form-input" id="ticketInput" placeholder="Paste ticket ID here" />
        <button class="btn btn-primary" id="verifyBtn">Verify</button>
      </div>
      <div id="result" style="margin-top:1.5rem;"></div>
    </div>
  </main>
  <script>
const verifyBtn = document.getElementById('verifyBtn')
const ticketInput = document.getElementById('ticketInput')
const resultDiv = document.getElementById('result')

verifyBtn.addEventListener('click', async () => {
  const id = ticketInput.value.trim()
  if (!id) return
  resultDiv.innerHTML = '<div class="spinner"></div>'
  try {
    const data = await API.admin('tickets', 'verify', { ticket_id: id })
    const t = data.ticket
    if (data.valid) {
      resultDiv.innerHTML = `<div class="card" style="border:2px solid var(--success);background:#f0fdf4;">
        <p style="font-size:1.5rem;color:var(--success);">&#10003; VALID</p>
        <p><strong>Ticket:</strong> ${t.ticket_id}</p>
        <p><strong>Status:</strong> ${t.status}</p>
        <p style="font-size:0.85rem;color:var(--gray-500);margin-top:0.5rem;">Verified at ${new Date().toLocaleTimeString()}</p>
      </div>`
    } else {
      resultDiv.innerHTML = `<div class="card" style="border:2px solid var(--danger);background:#fef2f2;">
        <p style="font-size:1.5rem;color:var(--danger);">&#10007; INVALID</p>
        <p><strong>Ticket:</strong> ${t?.ticket_id || id}</p>
        <p><strong>Status:</strong> ${t?.status || 'Not found'}</p>
      </div>`
    }
  } catch (err) {
    resultDiv.innerHTML = `<div class="alert alert-danger">${err.message}</div>`
  }
})

ticketInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') verifyBtn.click() })
  </script>
</body>
</html>
