<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - CSM Auditorium</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/api.js"></script>
</head>

<body>
  <header class="header">
    <div class="container">
      <div class="header-left">
        <span class="header-logo">🏛️</span>
        <div>
          <div class="header-title">Chhatrapati Shivaji Maharaj Auditorium</div>
          <div class="header-subtitle">Naval Station Karanja</div>
        </div>
      </div>
      <button class="hamburger" id="hamburgerBtn" aria-label="Menu">☰</button>
      <nav class="nav" id="mainNav">
        <a href="/">Home</a>
        <a href="/events.html">Events</a>
        <a href="/login.html" id="loginBtn">Login</a>
        <a href="/register.html" id="registerBtn">Register</a>
        <a href="/profile.html" id="profileLink" style="display:none">Profile</a>
        <a href="#" id="logoutBtn" style="display:none">Logout</a>
      </nav>
    </div>
  </header>

  <div class="auth-page">
    <div class="auth-card">
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-subtitle">Enter your email to receive reset link</p>
      <div id="alert" aria-live="polite"></div>
      <form id="forgotForm">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" required placeholder="your@email.com" autocomplete="email" autofocus />
        </div>
        <button class="btn btn-primary btn-block btn-lg" type="submit">Send Reset Link</button>
      </form>
      <div style="text-align:center;margin-top:1rem;font-size:0.9rem;">
        <a href="/login.html">Back to Login</a>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 CSM Auditorium, Naval Station Karanja. All rights reserved.</p>
    </div>
  </footer>
  <script src="/js/auth.js"></script>
  <script src="/js/dark-mode.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const hamburger = document.getElementById('hamburgerBtn')
      const nav = document.getElementById('mainNav')
      if (!hamburger || !nav) return
      hamburger.addEventListener('click', function() {
        nav.classList.toggle('nav-open')
        hamburger.textContent = nav.classList.contains('nav-open') ? '\u2715' : '\u2630'
      })
      document.addEventListener('click', function(e) {
        if (!hamburger.contains(e.target) && !nav.contains(e.target)) {
          nav.classList.remove('nav-open')
          hamburger.textContent = '\u2630'
        }
      })
    })
  </script>
</body>
</html>
