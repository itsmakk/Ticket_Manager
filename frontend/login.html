<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - CSM Auditorium</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to book tickets</p>
      <div id="alert"></div>
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" required placeholder="your@email.com" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" required placeholder="Enter password" />
        </div>
        <button class="btn btn-primary btn-block btn-lg" type="submit">Sign In</button>
      </form>
      <div style="text-align:center;margin-top:1rem;font-size:0.9rem;">
        <a href="/forgot-password.html">Forgot password?</a>
      </div>
      <div style="text-align:center;margin-top:0.5rem;font-size:0.9rem;">
        Don't have an account? <a href="/register.html">Register</a>
      </div>
    </div>
  </div>
  <script src="/js/auth.js"></script>
</body>
</html>
