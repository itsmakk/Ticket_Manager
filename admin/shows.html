<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Shows - CSM Admin</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/admin/css/admin.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar"></aside>
    <main class="admin-main">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
        <h1>Shows</h1>
        <button class="btn btn-primary" onclick="showShowModal()">+ New Show</button>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table id="showsTable">
            <thead><tr><th>Event</th><th>Date</th><th>Time</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="showsBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="showModal" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="showModalTitle">New Show</h2>
        <button class="modal-close" onclick="closeShowModal()">&times;</button>
      </div>
      <form id="showForm">
        <input type="hidden" id="showId" />
        <div class="form-group">
          <label class="form-label">Event</label>
          <select class="form-input form-select" id="showEventId" required></select>
        </div>
        <div class="form-group">
          <label class="form-label">Date</label>
          <input class="form-input" type="date" id="showDate" required />
        </div>
        <div class="form-group">
          <label class="form-label">Start Time</label>
          <input class="form-input" type="time" id="showTime" required />
        </div>
        <div class="form-group">
          <label class="form-label">Duration (minutes)</label>
          <input class="form-input" type="number" id="showDuration" value="120" required />
        </div>
        <div class="form-group">
          <label class="form-label">Premium Price (₹)</label>
          <input class="form-input" type="number" id="pricePremium" value="300" />
        </div>
        <div class="form-group">
          <label class="form-label">Gold Price (₹)</label>
          <input class="form-input" type="number" id="priceGold" value="250" />
        </div>
        <div class="form-group">
          <label class="form-label">Silver Price (₹)</label>
          <input class="form-input" type="number" id="priceSilver" value="200" />
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-input form-select" id="showStatus">
            <option value="Upcoming">Upcoming</option><option value="Active">Active</option>
            <option value="Completed">Completed</option><option value="Cancelled">Cancelled</option>
          </select>
        </div>
        <button class="btn btn-primary btn-block" type="submit">Save Show</button>
      </form>
    </div>
  </div>
  <script src="/admin/js/shows.js"></script>
</body>
</html>
