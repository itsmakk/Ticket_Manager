<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - CSM Auditorium</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Register to book tickets online</p>
      <div id="alert"></div>
      <form id="registerForm">
        <div class="form-group">
          <label class="form-label" for="fullName">Full Name</label>
          <input class="form-input" type="text" id="fullName" required placeholder="Your full name" />
        </div>
        <div class="form-group">
          <label class="form-label" for="mobile">Mobile Number</label>
          <input class="form-input" type="tel" id="mobile" required placeholder="9876543210" pattern="[0-9]{10}" />
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" required placeholder="your@email.com" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" required placeholder="Min 6 characters" minlength="6" />
        </div>
        <button class="btn btn-primary btn-block btn-lg" type="submit">Create Account</button>
      </form>
      <div style="text-align:center;margin-top:1rem;font-size:0.9rem;">
        Already have an account? <a href="/login.html">Sign In</a>
      </div>
    </div>
  </div>
  <script src="/js/auth.js"></script>
</body>
</html>
