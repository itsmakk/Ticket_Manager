<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - CSM Auditorium</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-subtitle">Enter your email to receive reset link</p>
      <div id="alert"></div>
      <form id="forgotForm">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" required placeholder="your@email.com" />
        </div>
        <button class="btn btn-primary btn-block btn-lg" type="submit">Send Reset Link</button>
      </form>
      <div style="text-align:center;margin-top:1rem;font-size:0.9rem;">
        <a href="/login.html">Back to Login</a>
      </div>
    </div>
  </div>
  <script src="/js/auth.js"></script>
</body>
</html>
